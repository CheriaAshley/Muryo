<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办申请 - Muryo</title>
    <link rel="stylesheet" href="css/todoapply.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="page">

    <header class="topbar">
        <div class="logo" onclick="goHome()">Muryo ~</div>

        <div class="user-actions">
            <span id="welcomeText"></span>
            <button id="loginBtn" onclick="goLogin()">登录</button>
            <button id="logoutBtn" onclick="logout()">退出登录</button>
        </div>
    </header>

    <div class="main">

        <aside class="sidebar">
            <ul>
                <li onclick="goHome()">首页</li>
                <li onclick="goMyPage()">我的主页</li>
                <li onclick="goMyApply()">我的申请</li>
                <li onclick="goMyTrade()">我的交换</li>
                <li class="active" onclick="goTodoApply()">待办申请</li>
            </ul>
        </aside>

        <section class="content">
            <div class="content-header">
                <h1>待办申请</h1>
                <p>查看我收到的未处理申请和待交换申请</p>
            </div>

            <div class="apply-section">
                <h2>我收到的待办申请</h2>
                <div class="apply-list" id="todoList">
                    <p>正在加载待办申请...</p>
                </div>
            </div>
        </section>

    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/todoapply.js"></script>
</body>
</html>
