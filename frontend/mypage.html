<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的主页 - Muryo</title>
    <link rel="stylesheet" href="css/mypage.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="page">

    <header class="topbar">
        <div class="logo" onclick="goHome()">Muryo ~</div>

        <div class="user-actions">
            <span id="welcomeText"></span>
            <button id="loginBtn" onclick="goLogin()">登录</button>
            <button id="logoutBtn" onclick="logout()">退出登录</button>
        </div>
    </header>

    <div class="main">

        <aside class="sidebar">
            <ul>
                <li onclick="goHome()">首页</li>
                <li class="active" onclick="goMyPage()">我的主页</li>
                <li onclick="goMyApply()">我的申请</li>
                <li onclick="goMyExchange()">我的交换</li>
                <li onclick="goTodoApply()">待办申请</li>
            </ul>
        </aside>

        <section class="content">
            <div class="content-header">
                <h1>我的主页</h1>
                <p>查看个人信息和我发布的制品</p>
            </div>

            <div class="profile-card" id="profileCard">
                <h2>个人信息</h2>
                <p>加载中...</p>
            </div>

            <div class="my-items-section">
                <h2>我的制品</h2>
                <div class="item-list" id="myItemList">
                    <p>正在加载我的制品...</p>
                </div>
            </div>
        </section>

    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/mypage.js"></script>
</body>
</html>
